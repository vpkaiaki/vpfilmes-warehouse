<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Paletes - VP Filmes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #f5f5f5; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
h1 { color: #0B2027; margin-bottom: 10px; }
.btns { margin: 15px 0; }
button { padding: 10px 15px; background: #0B2027; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
.warehouse { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 20px; margin-top: 20px; }
.lado { border: 2px solid #0B2027; padding: 15px; border-radius: 6px; }
.titulo { font-weight: bold; margin-bottom: 15px; text-align: center; }
.corredor { background: #e8f7f9; border: 1px solid #4FB8C0; padding: 10px; margin-bottom: 20px; cursor: pointer; border-radius: 4px; }
.corredor:hover { background: #d0f0f5; }
.paletes { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
.palete { background: #FF6B35; color: white; padding: 3px 5px; border-radius: 2px; font-size: 9px; cursor: pointer; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 999; }
.modal.show { display: flex; }
.modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>Sistema de Paletes - VP Filmes Galpão 09</h1>
  <div class="btns">
    <button onclick="limpar()">Limpar</button>
    <button onclick="exportar()">Exportar</button>
    <button onclick="importar()">Importar</button>
  </div>
  <div class="warehouse">
    <div class="lado" id="esq"></div>
    <div style="text-align: center; padding: 20px;">
      <div style="font-weight: bold; font-size: 18px; color: #0B2027;">VP FILMES</div>
      <div style="font-size: 12px; color: #999;">Galp 09</div>
      <div style="font-size: 12px; color: #999; margin-top: 10px;">Blumenau, SC</div>
    </div>
    <div class="lado" id="dir"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="ttl">Adicionar</h3>
    <input type="text" id="forn" placeholder="Fornecedor">
    <select id="larg">
      <option>Largura</option>
      <option value="680">680mm</option>
      <option value="912">912mm</option>
      <option value="942">942mm</option>
      <option value="972">972mm</option>
    </select>
    <select id="qtd">
      <option value="1">1 bobina</option>
      <option value="2">2 bobinas</option>
      <option value="3">3 bobinas</option>
    </select>
    <input type="number" id="pes" placeholder="Peso (kg)">
    <div style="margin-top: 15px;">
      <button onclick="salvar()" style="width: 48%; margin-right: 4%;">Salvar</button>
      <button onclick="fecha()" style="width: 48%; background: #999;">Sair</button>
    </div>
    <button id="del" onclick="deletar()" style="width: 100%; display: none; background: #d94a1f; margin-top: 5px;">Deletar</button>
  </div>
</div>

<script>
const ESQ = ['E1','E2','E3','E4','E5','E6','E7','E8','E9','E10'];
const DIR = ['D1','D2','D3','D4','D5','D6','D7','D8','D9','D10','D11','D12','D13','D14','D15','D16','D17'];
const TAMANHOS = {E9:6.1, E10:6.1, D16:6.1, D17:6.1};

let paletes = {};
let corr_selecionado = null;
let idx_selecionado = null;

function carregar() {
  ESQ.forEach(c => paletes[c] = []);
  DIR.forEach(c => paletes[c] = []);
  let saved = localStorage.getItem('paletes_vp');
  if (saved) {
    try {
      paletes = JSON.parse(saved);
    } catch(e) {
      console.log('Erro ao carregar:', e);
    }
  }
}

function render() {
  let esq_html = '<div class="titulo">ESQUERDA (10)</div>';
  ESQ.forEach(c => {
    esq_html += renderCorredor(c);
  });
  document.getElementById('esq').innerHTML = esq_html;
  
  let dir_html = '<div class="titulo">DIREITA (17)</div>';
  DIR.forEach(c => {
    dir_html += renderCorredor(c);
  });
  document.getElementById('dir').innerHTML = dir_html;
}

function renderCorredor(c) {
  let t = TAMANHOS[c] || 7.5;
  let pals = paletes[c];
  let peso_tot = 0;
  let comp = 0;
  
  pals.forEach(p => {
    peso_tot += parseInt(p.peso || 0);
    comp += parseInt(p.larg || 0) / 1000;
  });
  
  let livre = (t - comp).toFixed(2);
  let pals_html = '';
  
  pals.forEach((p, i) => {
    pals_html += '<div class="palete" onclick="editar(\'' + c + '\',' + i + ')">' + p.forn.substring(0,2) + ' ' + p.larg + 'mm</div>';
  });
  
  return '<div class="corredor" onclick="abrir(\'' + c + '\')">' +
    '<div><strong>' + c + '</strong> ' + t.toFixed(2) + 'm</div>' +
    '<div class="paletes">' + pals_html + '</div>' +
    '<div style="font-size:9px; margin-top:5px;">' + peso_tot + 'kg | ' + livre + 'm livre</div>' +
    '</div>';
}

function abrir(c) {
  corr_selecionado = c;
  idx_selecionado = null;
  document.getElementById('ttl').textContent = 'Adicionar - ' + c;
  document.getElementById('forn').value = '';
  document.getElementById('larg').value = '';
  document.getElementById('qtd').value = '1';
  document.getElementById('pes').value = '';
  document.getElementById('del').style.display = 'none';
  document.getElementById('modal').classList.add('show');
}

function editar(c, i) {
  corr_selecionado = c;
  idx_selecionado = i;
  let p = paletes[c][i];
  document.getElementById('ttl').textContent = 'Editar - ' + c;
  document.getElementById('forn').value = p.forn;
  document.getElementById('larg').value = p.larg;
  document.getElementById('qtd').value = p.qtd;
  document.getElementById('pes').value = p.peso;
  document.getElementById('del').style.display = 'block';
  document.getElementById('modal').classList.add('show');
}

function salvar() {
  let f = document.getElementById('forn').value.trim();
  let l = document.getElementById('larg').value;
  let q = document.getElementById('qtd').value;
  let w = document.getElementById('pes').value;
  if (!f || l === 'Largura' || !w) {
    alert('Preencha tudo!');
    return;
  }
  let p = { forn: f, larg: l, qtd: q, peso: w };
  if (idx_selecionado !== null) {
    paletes[corr_selecionado][idx_selecionado] = p;
  } else {
    paletes[corr_selecionado].push(p);
  }
  localStorage.setItem('paletes_vp', JSON.stringify(paletes));
  render();
  fecha();
}

function deletar() {
  if (idx_selecionado !== null) {
    paletes[corr_selecionado].splice(idx_selecionado, 1);
    localStorage.setItem('paletes_vp', JSON.stringify(paletes));
    render();
    fecha();
  }
}

function fecha() {
  document.getElementById('modal').classList.remove('show');
}

function limpar() {
  if (confirm('Limpar tudo?')) {
    ESQ.forEach(c => paletes[c] = []);
    DIR.forEach(c => paletes[c] = []);
    localStorage.setItem('paletes_vp', JSON.stringify(paletes));
    render();
  }
}

function exportar() {
  let a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(paletes, null, 2));
  a.download = 'paletes.json';
  a.click();
}

function importar() {
  let i = document.createElement('input');
  i.type = 'file';
  i.accept = '.json';
  i.onchange = function(e) {
    let f = e.target.files[0];
    let r = new FileReader();
    r.onload = function(ev) {
      try {
        paletes = JSON.parse(ev.target.result);
        localStorage.setItem('paletes_vp', JSON.stringify(paletes));
        render();
      } catch(err) {
        alert('Erro!');
      }
    };
    r.readAsText(f);
  };
  i.click();
}

document.getElementById('modal').onclick = function(e) {
  if (e.target.id === 'modal') fecha();
};

carregar();
render();
</script>
</body>
</html>
