<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Paletes - VP Filmes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 8px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { color: #0B2027; margin-bottom: 10px; font-size: 24px; }
.subtitle { color: #666; font-size: 12px; margin-bottom: 25px; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; }
button { padding: 8px 16px; background: #0B2027; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
button:hover { background: #0a1820; }
.warehouse { display: grid; grid-template-columns: 1fr 120px 1fr; gap: 40px; margin-top: 25px; }
.side { border: 2px solid #0B2027; border-radius: 6px; padding: 15px; background: #f9f9f9; }
.side-title { font-weight: bold; color: #0B2027; font-size: 14px; margin-bottom: 15px; text-align: center; }
.corredor-solo { height: 45px; background: linear-gradient(to right, #e8f7f9, #f0f0f0); border: 1px solid #4FB8C0; border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #0B2027; cursor: pointer; transition: all 0.2s; margin-bottom: 25px; width: 100%; position: relative; min-height: 80px; padding: 10px; }
.corredor-solo:hover { background: #d0f0f5; }
.corredor-duplo { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; width: 100%; }
.corredor-item { height: 45px; background: linear-gradient(to right, #e8f7f9, #f0f0f0); border: 1px solid #4FB8C0; border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #0B2027; cursor: pointer; transition: all 0.2s; position: relative; min-height: 80px; padding: 10px; margin-bottom: 25px; }
.corredor-610-esq { width: 81.33%; margin-left: 18.67%; }
.corredor-610-dir { width: 81.33%; margin-right: 18.67%; }
.corredor-nome { font-weight: bold; font-size: 12px; }
.corredor-tamanho { font-size: 9px; color: #999; margin-top: 2px; }
.paletes-container { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 30px; display: flex; align-items: flex-end; gap: 2px; overflow-x: auto; background: rgba(255,255,255,0.5); border-radius: 2px; padding: 2px; }
.palete { background: #FF6B35; border: 1px solid #D94A1F; border-radius: 2px; color: white; font-size: 8px; padding: 4px 2px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.palete:hover { background: #E55A25; opacity: 0.8; }
.palete-info { font-weight: bold; font-size: 8px; }
.corredor-info { position: absolute; bottom: 2px; left: 5px; right: 5px; font-size: 8px; color: #666; }
.center-info { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.center-info p { color: #666; font-size: 12px; margin-bottom: 8px; }
.center-info strong { color: #0B2027; font-size: 14px; }
.specs { background: #f0f8fb; padding: 10px; border-radius: 4px; border-left: 3px solid #4FB8C0; margin-top: 10px; font-size: 11px; color: #666; line-height: 1.6; }
.specs strong { color: #0B2027; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: white; padding: 25px; border-radius: 8px; max-width: 500px; width: 90%; }
.modal-content h2 { color: #0B2027; margin-bottom: 15px; font-size: 18px; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-weight: 500; color: #0B2027; margin-bottom: 6px; font-size: 13px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #4FB8C0; }
.modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
.modal-buttons button { flex: 1; }
.btn-danger { background: #D94A1F !important; }
.btn-danger:hover { background: #C93A0F !important; }
</style>
</head>
<body>
<div class="container">
  <h1>Sistema de Paletes - VP Filmes Galpão 09</h1>
  <div class="subtitle">BOPP - Gerenciamento de Paletes nos Corredores</div>
  <div class="controls">
    <button onclick="limparTudo()">Limpar Tudo</button>
    <button onclick="exportarDados()">Exportar</button>
    <button onclick="importarDados()">Importar</button>
  </div>
  <div class="warehouse">
    <div class="side">
      <div class="side-title">ESQUERDA (10 CORREDORES)</div>
      <div id="esquerda-corredores"></div>
    </div>
    <div class="center-info">
      <strong>VP FILMES</strong>
      <p>Galp 09</p>
      <p>Blumenau, SC</p>
      <div class="specs"><strong>BOPP - Paletes</strong><br>Bobinas deitadas<br>Alt: 0,80m<br><br><strong>Profundidade:</strong><br>0,80m (default)</div>
    </div>
    <div class="side">
      <div class="side-title">DIREITA (17 CORREDORES)</div>
      <div id="direita-corredores"></div>
    </div>
  </div>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modal-title">Adicionar Palete</h2>
    <div class="form-group"><label>Fornecedor</label><input type="text" id="fornecedor" placeholder="Ex: Label Packing"></div>
    <div class="form-group"><label>Largura Bobina (mm)</label><select id="largura"><option value="">Selecione...</option><option value="680">680mm</option><option value="912">912mm</option><option value="942">942mm</option><option value="972">972mm</option></select></div>
    <div class="form-group"><label>Quantidade Bobinas (1-3)</label><select id="qty"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
    <div class="form-group"><label>Peso Total (kg)</label><input type="number" id="peso" placeholder="Ex: 500"></div>
    <div class="form-group"><label>Profundidade Palete (m)</label><input type="number" id="profundidade" value="0.80" step="0.05" min="0.75" max="0.80"></div>
    <div class="modal-buttons"><button onclick="salvarPalete()">Salvar</button><button onclick="fecharModal()" style="background: #999;">Cancelar</button><button class="btn-danger" id="btn-deletar" onclick="deletarPalete()" style="display:none;">Deletar</button></div>
  </div>
</div>
<script>
const ALTURA_BOBINA = 0.80;
const esquerda = ['E1', 'E2', 'E3', 'E4', 'E5', 'E6', 'E7', 'E8', 'E9', 'E10'];
const direita = ['D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8', 'D9', 'D10', 'D11', 'D12', 'D13', 'D14', 'D15', 'D16', 'D17'];
const tamanhos = {'E9': 6.10, 'E10': 6.10, 'D16': 6.10, 'D17': 6.10};
let paletes = {};
let corredorAtual = null;
let paleteSelecionado = null;
function inicializar() {
  esquerda.forEach(c => paletes[c] = []);
  direita.forEach(c => paletes[c] = []);
  carregarDados();
  renderizar();
}
function renderizar() {
  renderizarLado('esquerda-corredores', esquerda);
  renderizarLado('direita-corredores', direita);
}
function renderizarLado(elementId, corredores) {
  const html = corredores.map(corredor => {
    const tamanho = tamanhos[corredor] || 7.5;
    const paletesArray = paletes[corredor] || [];
    const pesoTotal = paletesArray.reduce((sum, p) => sum + (p.peso || 0), 0);
    const comprimentoOcupado = paletesArray.reduce((sum, p) => {
      const comp = (parseInt(p.largura) || 0) / 1000;
      return sum + comp;
    }, 0);
    const comprimentoLivre = tamanho - comprimentoOcupado;
    const isE9E10 = ['E9', 'E10'].includes(corredor);
    const isDireita16_17 = ['D16', 'D17'].includes(corredor);
    const paletesHtml = paletesArray.map((p, idx) => {
      const comp = (parseInt(p.largura) || 680) / 1000;
      const alt = ALTURA_BOBINA * parseInt(p.qty);
      const percentComp = (comp / tamanho) * 100;
      return `<div class="palete" style="width: ${percentComp}%; height: ${alt * 30}px;" onclick="editarPalete('${corredor}', ${idx})" title="${p.fornecedor} - ${p.largura}mm - ${p.qty}x - ${p.peso}kg"><div class="palete-info">${p.fornecedor.substring(0,3)}</div><div style="font-size:7px">${p.largura}mm</div></div>`;
    }).join('');
    let classes = '';
    if (corredor === 'D1') {
      classes = 'corredor-solo';
    } else if (isE9E10) {
      classes = 'corredor-item corredor-610-esq';
    } else if (isDireita16_17) {
      classes = 'corredor-item corredor-610-dir';
    } else {
      classes = 'corredor-item';
    }
    return `<div class="${classes}" onclick="abrirModal('${corredor}')"><div class="corredor-nome">${corredor}</div><div class="corredor-tamanho">${tamanho.toFixed(2)}m</div><div class="paletes-container">${paletesHtml}</div><div class="corredor-info">${pesoTotal}kg | ${comprimentoLivre.toFixed(2)}m livre</div></div>`;
  }).join('');
  document.getElementById(elementId).innerHTML = html;
}
function abrirModal(corredor) {
  corredorAtual = corredor;
  paleteSelecionado = null;
  document.getElementById('modal-title').textContent = `Adicionar Palete - ${corredor}`;
  document.getElementById('fornecedor').value = '';
  document.getElementById('largura').value = '';
  document.getElementById('qty').value = '1';
  document.getElementById('peso').value = '';
  document.getElementById('profundidade').value = '0.80';
  document.getElementById('btn-deletar').style.display = 'none';
  document.getElementById('modal').classList.add('active');
}
function editarPalete(corredor, idx) {
  corredorAtual = corredor;
  paleteSelecionado = idx;
  const p = paletes[corredor][idx];
  document.getElementById('modal-title').textContent = `Editar Palete - ${corredor}`;
  document.getElementById('fornecedor').value = p.fornecedor;
  document.getElementById('largura').value = p.largura;
  document.getElementById('qty').value = p.qty;
  document.getElementById('peso').value = p.peso;
  document.getElementById('profundidade').value = p.profundidade;
  document.getElementById('btn-deletar').style.display = 'block';
  document.getElementById('modal').classList.add('active');
}
function salvarPalete() {
  const fornecedor = document.getElementById('fornecedor').value.trim();
  const largura = document.getElementById('largura').value;
  const qty = document.getElementById('qty').value;
  const peso = document.getElementById('peso').value;
  const profundidade = document.getElementById('profundidade').value;
  if (!fornecedor || !largura || !peso) {
    alert('Preencha todos os campos!');
    return;
  }
  const palete = { fornecedor, largura, qty, peso: parseInt(peso), profundidade: parseFloat(profundidade) };
  if (paleteSelecionado !== null) {
    paletes[corredorAtual][paleteSelecionado] = palete;
  } else {
    paletes[corredorAtual].push(palete);
  }
  salvarDados();
  renderizar();
  fecharModal();
}
function deletarPalete() {
  if (paleteSelecionado !== null) {
    paletes[corredorAtual].splice(paleteSelecionado, 1);
    salvarDados();
    renderizar();
    fecharModal();
  }
}
function fecharModal() {
  document.getElementById('modal').classList.remove('active');
}
function salvarDados() {
  localStorage.setItem('paletes_bopp', JSON.stringify(paletes));
}
function carregarDados() {
  const dados = localStorage.getItem('paletes_bopp');
  if (dados) {
    paletes = JSON.parse(dados);
  }
}
function limparTudo() {
  if (confirm('Limpar TODOS os paletes?')) {
    Object.keys(paletes).forEach(k => paletes[k] = []);
    salvarDados();
    renderizar();
  }
}
function exportarDados() {
  const json = JSON.stringify(paletes, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `paletes-bopp-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}
function importarDados() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        paletes = JSON.parse(event.target.result);
        salvarDados();
        renderizar();
        alert('Dados importados com sucesso!');
      } catch (err) {
        alert('Erro ao importar arquivo!');
      }
    };
    reader.readAsText(file);
  };
