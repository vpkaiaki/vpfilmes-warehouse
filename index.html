<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Paletes - VP Filmes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #f5f5f5; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; }
h1 { color: #0B2027; margin-bottom: 5px; }
.subtitle { color: #999; font-size: 12px; margin-bottom: 20px; }
button { padding: 10px 15px; background: #0B2027; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; margin-bottom: 15px; }
button:hover { background: #000; }
.warehouse { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 30px; }
.lado { border: 2px solid #0B2027; padding: 15px; border-radius: 6px; }
.lado-title { font-weight: bold; margin-bottom: 15px; text-align: center; }
.corredor { background: linear-gradient(to right, #e8f7f9, #f0f0f0); border: 1px solid #4FB8C0; padding: 12px; margin-bottom: 25px; border-radius: 4px; cursor: pointer; position: relative; min-height: 70px; }
.corredor:hover { background: #d0f0f5; }
.corredor-head { font-weight: bold; margin-bottom: 5px; }
.corredor-size { font-size: 10px; color: #999; }
.corredor-info { font-size: 9px; margin-top: 5px; }
.paletes { display: flex; gap: 2px; margin-top: 8px; flex-wrap: wrap; }
.palete { background: #FF6B35; color: white; padding: 4px 6px; border-radius: 2px; font-size: 9px; cursor: pointer; }
.palete:hover { background: #E55A25; }
.centro { text-align: center; }
.centro strong { font-size: 16px; color: #0B2027; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 999; }
.modal.show { display: flex; }
.modal-box { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; }
.modal-box h2 { margin-bottom: 15px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 13px; }
.form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
.modal-btns { display: flex; gap: 10px; margin-top: 15px; }
.modal-btns button { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>Sistema de Paletes - VP Filmes Galpão 09</h1>
  <div class="subtitle">BOPP - Gerenciamento de Paletes nos Corredores</div>
  <div>
    <button onclick="limpar()">Limpar Tudo</button>
    <button onclick="exportar()">Exportar</button>
    <button onclick="importar()">Importar</button>
  </div>
  <div class="warehouse">
    <div class="lado" id="esq"></div>
    <div class="centro">
      <strong>VP FILMES</strong>
      <p>Galp 09</p>
      <p style="font-size:12px; color:#999;">Blumenau, SC</p>
      <div style="background:#f0f8fb; padding:10px; margin-top:15px; border-radius:4px; border-left:3px solid #4FB8C0; font-size:11px;">
        <strong>BOPP</strong><br>Bobinas deitadas<br>Alt: 0,80m
      </div>
    </div>
    <div class="lado" id="dir"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="mod-title">Adicionar</h2>
    <div class="form-group">
      <label>Fornecedor</label>
      <input type="text" id="forn">
    </div>
    <div class="form-group">
      <label>Largura (mm)</label>
      <select id="larg">
        <option>Selecione</option>
        <option value="680">680</option>
        <option value="912">912</option>
